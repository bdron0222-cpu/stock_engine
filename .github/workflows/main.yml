name: Stock Engine Automation

on:
  schedule:
    # 每天 15:30 (台灣時間) 執行 = 07:30 (UTC)
    - cron: '30 7 * * *'
    # 每週一 09:00 (台灣時間) 執行 = 01:00 (UTC)
    - cron: '0 1 * * 1'
  workflow_dispatch: # 允許你手動在網頁按按鈕觸發

jobs:
  daily-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必須開放寫入權限，以便 push CSV
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas pandas_ta yfinance streamlit requests scipy numpy tqdm matplotlib

      # 週一排程任務
      - name: Run Weekly Fetch
        if: github.event.schedule == '0 1 * * 1'
        run: python data_loader/fetch_stock_list.py

      # 每日排程任務
      - name: Run Daily Tasks
        if: github.event.schedule == '30 7 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          python market_monitor.py
          python main.py

      # 將產出的檔案推回 Git (重要！)
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # 如果沒有檔案變更，這步會自動略過，不會報錯
          git add watchlist_conservative.csv watchlist_aggressive.csv watchlist_noise.csv stocks_list.csv market_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock data [bot]" && git push)