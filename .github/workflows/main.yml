name: Stock Engine Automation

on:
  schedule:
    - cron: '30 7 * * *'
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  daily-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # 強制使用 3.11 以支援最新套件

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 使用標準安裝，Python 3.11 可以順利解析 pandas-ta
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pandas-ta

      # 週一排程任務
      - name: Run Weekly Fetch
        if: github.event.schedule == '0 1 * * 1'
        run: python data_loader/fetch_stock_list.py

      # 每日排程任務
      - name: Run Daily Tasks
        if: github.event.schedule == '30 7 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          python market_monitor.py
          python main.py

      # 將產出的檔案推回 Git
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add watchlist_conservative.csv watchlist_aggressive.csv watchlist_noise.csv stocks_list.csv market_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock data [bot]" && git push)