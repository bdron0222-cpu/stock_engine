name: Stock Engine Automation

on:
  schedule:
    # 每天 15:30 (台灣時間)
    - cron: '30 7 * * *'
    # 每週一 09:00 (台灣時間)
    - cron: '0 1 * * 1'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pandas-ta --ignore-requires-python

      # 【終極修正版】利用 Python 腳本直接處理檔案，避開所有 Shell 引號問題
      - name: Patch pandas-ta syntax error
        run: |
          # 取得 pandas-ta 安裝路徑
          INSTALL_PATH=$(pip show pandas-ta | grep "Location:" | awk '{print $2}')
          FILE_PATH="$INSTALL_PATH/pandas_ta/overlap/hma.py"
          
          echo "正在修復檔案: $FILE_PATH"
          
          # 使用 Python 執行字串替換，不需要處理 Shell 引號跳脫問題
          python -c "
          path = '$FILE_PATH'
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()
          # 修復 f-string 的雙引號衝突
          content = content.replace('f\"HMA{\"\"', \"f'HMA{''\")
          content = content.replace('mamode == \"wma\"', \"mamode == 'wma'\")
          with open(path, 'w', encoding='utf-8') as f:
              f.write(content)
          "
          echo "語法修正成功！"

      - name: Run Fetcher & Monitor
        run: |
          if [ "${{ github.event.schedule }}" == "0 1 * * 1" ]; then
            python data_loader/fetch_stock_list.py
          else
            python market_monitor.py
            python main.py
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 強制加入 csv 與狀態檔
          git add -f watchlist_conservative.csv watchlist_aggressive.csv watchlist_noise.csv stocks_list.csv market_state.json
          
          # 如果沒有變更則跳過
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新: 每日選股結果" && git push)