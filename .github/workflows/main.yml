name: Stock Engine Automation

on:
  schedule:
    # 每天 15:30 (台灣時間)
    - cron: '30 7 * * *'
    # 每週一 09:00 (台灣時間)
    - cron: '0 1 * * 1'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 使用你成功專案的 Python 3.10

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 先安裝標準套件 (確保 requirements.txt 沒有 pandas-ta)
          pip install --no-cache-dir -r requirements.txt
          # 強制安裝 pandas-ta，並忽略 metadata 中的 Python 版本限制
          pip install --no-cache-dir pandas-ta --ignore-requires-python

      - name: Run Fetcher & Monitor
        run: |
          if [ "${{ github.event.schedule }}" == "0 1 * * 1" ]; then
            python data_loader/fetch_stock_list.py
          else
            python market_monitor.py
            python main.py
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 將所有相關 CSV 與狀態檔加入 git (使用 -f 強制加入)
          git add -f watchlist_conservative.csv watchlist_aggressive.csv watchlist_noise.csv stocks_list.csv market_state.json
          
          # 如果沒有變更則跳過
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新: 每日選股結果" && git push)