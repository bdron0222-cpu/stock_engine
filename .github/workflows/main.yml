name: Stock Engine Automation

on:
  schedule:
    - cron: '30 7 * * *'
    - cron: '0 1 * * 1'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 1. 安裝 requirements.txt (現在裡面已經沒有 git+ 了)
          pip install --no-cache-dir -r requirements.txt
          # 2. 強制從 PyPI 安裝 pandas-ta
          pip install --no-cache-dir pandas-ta --ignore-requires-python

      # 【強制覆寫修正版】修正 pandas-ta 的語法錯誤
      - name: Patch pandas-ta syntax error
        run: |
          INSTALL_PATH=$(pip show pandas-ta | grep "Location:" | awk '{print $2}')
          FILE_PATH="$INSTALL_PATH/pandas_ta/overlap/hma.py"
          
          echo "正在強制修正檔案: $FILE_PATH"
          python -c "
          path = '$FILE_PATH'
          with open(path, 'r', encoding='utf-8') as f:
              lines = f.readlines()
          with open(path, 'w', encoding='utf-8') as f:
              for line in lines:
                  if 'hma.name = f' in line:
                      f.write('    hma.name = f\"HMA{\'\' if mamode == \'wma\' else mamode[0]}_{length}\"\n')
                  else:
                      f.write(line)
          "
          echo "語法強制修正成功！"

      - name: Run Fetcher & Monitor
        run: |
          if [ "${{ github.event.schedule }}" == "0 1 * * 1" ]; then
            python data_loader/fetch_stock_list.py
          else
            python market_monitor.py
            python main.py
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add -f watchlist_conservative.csv watchlist_aggressive.csv watchlist_noise.csv stocks_list.csv market_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新: 每日選股結果" && git push)