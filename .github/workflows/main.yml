name: Stock Engine Automation

on:
  schedule:
    # 每天 15:30 (台灣時間)
    - cron: '30 7 * * *'
    # 每週一 09:00 (台灣時間)
    - cron: '0 1 * * 1'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pandas-ta --ignore-requires-python

      # 【新增這一步】自動修復 pandas-ta 的語法錯誤
      - name: Patch pandas-ta syntax error
        run: |
          # 找到 hma.py 的位置並執行自動取代，將錯誤的 "" 改為 ''
          FILE_PATH=$(python -c "import pandas_ta; import os; print(os.path.dirname(pandas_ta.__file__) + '/overlap/hma.py')")
          sed -i "s/f\"HMA{\"\"/f\"HMA{''/g" "$FILE_PATH"
          echo "Successfully patched $FILE_PATH"

      - name: Run Fetcher & Monitor
        run: |
          if [ "${{ github.event.schedule }}" == "0 1 * * 1" ]; then
            python data_loader/fetch_stock_list.py
          else
            python market_monitor.py
            python main.py
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 強制加入 csv 與狀態檔
          git add -f watchlist_conservative.csv watchlist_aggressive.csv watchlist_noise.csv stocks_list.csv market_state.json
          
          # 如果沒有變更則跳過
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新: 每日選股結果" && git push)